<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seasonal Rates - Lakeside Retreat Admin</title>
    <link rel="stylesheet" href="/admin-shell.css?v=3">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }
        
        .page-header {
            margin-bottom: 2rem;
        }
        
        .page-header h2 {
            color: #2d5a5a;
            font-size: 1.5rem;
        }
        
        .page-header p {
            color: #666;
            margin-top: 0.5rem;
        }
        
        .rates-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .rate-card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .rate-card.summer {
            border-left: 4px solid #ff6b6b;
        }
        
        .rate-card.autumn {
            border-left: 4px solid #ffa94d;
        }
        
        .rate-card.winter {
            border-left: 4px solid #74c0fc;
        }
        
        .rate-card.spring {
            border-left: 4px solid #69db7c;
        }
        
        .rate-card h3 {
            color: #2d5a5a;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .rate-card .dates {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }
        
        .rate-card .status {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }
        
        .status.active {
            background: #d4edda;
            color: #155724;
        }
        
        .status.inactive {
            background: #f8d7da;
            color: #721c24;
        }
        
        .status.upcoming {
            background: #fff3cd;
            color: #856404;
        }
        
        .price-table {
            width: 100%;
            margin-bottom: 1rem;
        }
        
        .price-table td {
            padding: 0.5rem 0;
            border-bottom: 1px solid #eee;
        }
        
        .price-table td:last-child {
            text-align: right;
            font-weight: 600;
        }
        
        .form-group {
            margin-bottom: 1rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #333;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        
        .btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
        }
        
        .btn-primary {
            background: #2d5a5a;
            color: white;
        }
        
        .btn-primary:hover {
            background: #1e4040;
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        
        .btn-success {
            background: #28a745;
            color: white;
        }
        
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        
        .button-group {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        
        .add-season-card {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 2rem;
        }
        
        .add-season-card h3 {
            color: #2d5a5a;
            margin-bottom: 1.5rem;
        }
        
        .alert {
            padding: 1rem;
            border-radius: 4px;
            margin-bottom: 1rem;
        }
        
        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .multiplier-input {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .multiplier-input input {
            width: 80px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="alertBox"></div>

        <div class="page-header">
            <h2>Seasonal Rates Management</h2>
            <p>Configure pricing multipliers for different seasons throughout the year</p>
        </div>

        <!-- Edit Modal -->
        <div id="editModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1000; display:none; align-items:center; justify-content:center;">
            <div style="background:white; border-radius:12px; padding:2rem; width:90%; max-width:500px; box-shadow:0 8px 32px rgba(0,0,0,0.2);">
                <h3 style="color:#2d5a5a; margin-bottom:1.5rem;">Edit Seasonal Rate</h3>
                <input type="hidden" id="editSeasonId">
                <input type="hidden" id="editSeasonActive">
                <div class="form-row">
                    <div class="form-group">
                        <label for="editSeasonName">Season Name</label>
                        <input type="text" id="editSeasonName">
                    </div>
                    <div class="form-group">
                        <label for="editMultiplier">Price Multiplier</label>
                        <div class="multiplier-input">
                            <input type="number" id="editMultiplier" step="0.05" min="0.5" max="2.0">
                            <span>x base rate</span>
                        </div>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="editStartDate">Start Date</label>
                        <input type="date" id="editStartDate">
                    </div>
                    <div class="form-group">
                        <label for="editEndDate">End Date</label>
                        <input type="date" id="editEndDate">
                    </div>
                </div>
                <div class="button-group" style="justify-content:flex-end;">
                    <button class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
                    <button class="btn btn-primary" onclick="submitEdit()">Save Changes</button>
                </div>
            </div>
        </div>

        <div class="rates-grid" id="ratesGrid">
            <div style="text-align:center; padding:2rem; color:#666;">Loading seasonal rates...</div>
        </div>
        
        <div class="add-season-card">
            <h3>Add New Seasonal Rate</h3>
            <form id="addSeasonForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="seasonName">Season Name</label>
                        <input type="text" id="seasonName" placeholder="e.g., Easter Weekend">
                    </div>
                    <div class="form-group">
                        <label for="multiplier">Price Multiplier</label>
                        <div class="multiplier-input">
                            <input type="number" id="multiplier" value="1.0" step="0.05" min="0.5" max="2.0">
                            <span>x base rate</span>
                        </div>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="startDate">Start Date</label>
                        <input type="date" id="startDate">
                    </div>
                    <div class="form-group">
                        <label for="endDate">End Date</label>
                        <input type="date" id="endDate">
                    </div>
                </div>
                <div class="button-group">
                    <button type="submit" class="btn btn-primary">Add Season</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/admin-shell.js?v=3"></script>
    <script>
        // Authentication is handled by admin-shell.js via cookie verification

        function showAlert(message, type = 'success') {
            const alertBox = document.getElementById('alertBox');
            const div = document.createElement('div');
            div.className = `alert alert-${type}`;
            div.textContent = message;
            alertBox.innerHTML = '';
            alertBox.appendChild(div);
            setTimeout(() => { alertBox.innerHTML = ''; }, 3000);
        }

        // Base prices for calculating adjusted rates
        const basePrices = { 'Dome Pinot': 530, 'Dome Rosé': 510, 'Lakeside Cottage': 295 };

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            return d.toLocaleDateString('en-NZ', { month: 'short', day: 'numeric' });
        }

        function getSeasonStatus(rate) {
            const now = new Date();
            const start = new Date(rate.start_date);
            const end = new Date(rate.end_date);
            if (!rate.is_active) return { label: 'Inactive', cls: 'inactive' };
            if (now >= start && now <= end) return { label: 'Active', cls: 'active' };
            if (now < start) return { label: 'Upcoming', cls: 'upcoming' };
            return { label: 'Expired', cls: 'inactive' };
        }

        function getSeasonColor(name) {
            const n = (name || '').toLowerCase();
            if (n.includes('summer') || n.includes('peak') || n.includes('holiday')) return 'summer';
            if (n.includes('autumn') || n.includes('fall') || n.includes('harvest')) return 'autumn';
            if (n.includes('winter') || n.includes('cozy')) return 'winter';
            if (n.includes('spring')) return 'spring';
            return 'summer';
        }

        function renderRates(rates) {
            const grid = document.getElementById('ratesGrid');
            if (!rates || rates.length === 0) {
                grid.innerHTML = '<div style="text-align:center;padding:2rem;color:#666;">No seasonal rates configured. Add one below.</div>';
                return;
            }
            grid.innerHTML = rates.map(rate => {
                const status = getSeasonStatus(rate);
                const color = getSeasonColor(rate.name);
                const multiplier = parseFloat(rate.multiplier) || 1;
                const pctChange = Math.round((multiplier - 1) * 100);
                const pctLabel = pctChange >= 0 ? `+${pctChange}%` : `${pctChange}%`;
                const priceRows = Object.entries(basePrices).map(([name, base]) => {
                    const adjusted = Math.round(base * multiplier);
                    return `<tr><td>${name}</td><td>$${adjusted}/night (${pctLabel})</td></tr>`;
                }).join('');
                const toggleLabel = rate.is_active ? 'Deactivate' : 'Activate';
                const toggleBtn = rate.is_active
                    ? `<button class="btn btn-secondary" onclick="toggleSeason(${rate.id})">Deactivate</button>`
                    : `<button class="btn btn-success" onclick="toggleSeason(${rate.id})">Activate</button>`;
                return `
                    <div class="rate-card ${color}">
                        <h3>${escapeHtml(rate.name)}</h3>
                        <div class="dates">${formatDate(rate.start_date)} – ${formatDate(rate.end_date)}</div>
                        <span class="status ${status.cls}">${status.label}</span>
                        <div style="margin:0.5rem 0;font-size:0.9rem;color:#666;">Multiplier: <strong>${multiplier}x</strong></div>
                        <table class="price-table">${priceRows}</table>
                        <div class="button-group">
                            <button class="btn btn-primary" onclick="editSeason(${rate.id})">Edit</button>
                            ${toggleBtn}
                            <button class="btn btn-danger" onclick="deleteSeason(${rate.id})">Delete</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function loadSeasonalRates() {
            try {
                const response = await fetch('/api/admin/seasonal-rates', {
                    credentials: 'same-origin'
                });
                const data = await response.json();
                if (data.success) {
                    renderRates(data.rates || []);
                } else {
                    document.getElementById('ratesGrid').innerHTML = '<div style="text-align:center;padding:2rem;color:#dc3545;">Failed to load rates</div>';
                }
            } catch (error) {
                console.error('Error loading seasonal rates:', error);
                document.getElementById('ratesGrid').innerHTML = '<div style="text-align:center;padding:2rem;color:#dc3545;">Error loading rates</div>';
            }
        }

        async function deleteSeason(id) {
            if (!confirm('Are you sure you want to delete this seasonal rate?')) return;
            try {
                const csrfRes = await fetch('/api/csrf-token', { credentials: 'same-origin' });
                const csrfData = await csrfRes.json();
                const response = await fetch('/api/admin/seasonal-rates/' + id, {
                    method: 'DELETE',
                    headers: { 'X-CSRF-Token': csrfData.csrfToken },
                    credentials: 'same-origin'
                });
                const data = await response.json();
                if (data.success) {
                    showAlert('Season deleted successfully');
                    loadSeasonalRates();
                } else {
                    showAlert(data.error || 'Failed to delete', 'error');
                }
            } catch (err) {
                showAlert('Error: ' + err.message, 'error');
            }
        }

        async function editSeason(id) {
            try {
                const ratesRes = await fetch('/api/admin/seasonal-rates', { credentials: 'same-origin' });
                const ratesData = await ratesRes.json();
                const rate = ratesData.rates.find(r => r.id == id);
                if (!rate) { showAlert('Rate not found', 'error'); return; }

                // Populate and show the edit modal
                document.getElementById('editSeasonId').value = id;
                document.getElementById('editSeasonActive').value = rate.is_active ? '1' : '0';
                document.getElementById('editSeasonName').value = rate.name || '';
                document.getElementById('editMultiplier').value = rate.multiplier || 1;
                document.getElementById('editStartDate').value = rate.start_date || '';
                document.getElementById('editEndDate').value = rate.end_date || '';
                const modal = document.getElementById('editModal');
                modal.style.display = 'flex';
            } catch (err) {
                showAlert('Error: ' + err.message, 'error');
            }
        }

        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        async function submitEdit() {
            const id = document.getElementById('editSeasonId').value;
            const name = document.getElementById('editSeasonName').value.trim();
            const multiplier = parseFloat(document.getElementById('editMultiplier').value);
            const startDate = document.getElementById('editStartDate').value;
            const endDate = document.getElementById('editEndDate').value;
            const isActive = document.getElementById('editSeasonActive').value === '1';

            if (!name || !startDate || !endDate) {
                showAlert('Please fill in all fields', 'error');
                return;
            }

            try {
                const csrfRes = await fetch('/api/csrf-token', { credentials: 'same-origin' });
                const csrfData = await csrfRes.json();
                const response = await fetch('/api/admin/seasonal-rates/' + id, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRF-Token': csrfData.csrfToken
                    },
                    credentials: 'same-origin',
                    body: JSON.stringify({ name, multiplier, start_date: startDate, end_date: endDate, is_active: isActive })
                });
                const data = await response.json();
                if (data.success) {
                    closeEditModal();
                    showAlert('Season updated successfully');
                    loadSeasonalRates();
                } else {
                    showAlert('Failed to update: ' + (data.error || 'Unknown error'), 'error');
                }
            } catch (err) {
                showAlert('Error: ' + err.message, 'error');
            }
        }

        async function toggleSeason(id) {
            try {
                const ratesRes = await fetch('/api/admin/seasonal-rates', { credentials: 'same-origin' });
                const ratesData = await ratesRes.json();
                const rate = ratesData.rates.find(r => r.id == id);
                if (!rate) { showAlert('Rate not found', 'error'); return; }

                const csrfRes = await fetch('/api/csrf-token', { credentials: 'same-origin' });
                const csrfData = await csrfRes.json();
                const response = await fetch('/api/admin/seasonal-rates/' + id, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRF-Token': csrfData.csrfToken
                    },
                    credentials: 'same-origin',
                    body: JSON.stringify({ name: rate.name, multiplier: rate.multiplier, start_date: rate.start_date, end_date: rate.end_date, is_active: !rate.is_active })
                });
                const data = await response.json();
                if (data.success) {
                    showAlert('Season ' + (rate.is_active ? 'deactivated' : 'activated'));
                    loadSeasonalRates();
                } else {
                    showAlert('Failed to toggle: ' + (data.error || 'Unknown error'), 'error');
                }
            } catch (err) {
                showAlert('Error: ' + err.message, 'error');
            }
        }

        document.getElementById('addSeasonForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const name = document.getElementById('seasonName').value;
            const multiplier = parseFloat(document.getElementById('multiplier').value);
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            
            if (!name || !startDate || !endDate) {
                showAlert('Please fill in all fields', 'error');
                return;
            }
            
            try {
                const csrfRes = await fetch('/api/csrf-token', { credentials: 'same-origin' });
                const csrfData = await csrfRes.json();
                const response = await fetch('/api/admin/seasonal-rates', {
                    method: 'POST',
                    credentials: 'same-origin',
                    headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': csrfData.csrfToken },
                    body: JSON.stringify({ name, start_date: startDate, end_date: endDate, multiplier, is_active: true })
                });
                const data = await response.json();
                if (data.success) {
                    showAlert(`Season "${name}" added successfully!`);
                    this.reset();
                    loadSeasonalRates();
                } else {
                    showAlert(data.error || 'Failed to add season', 'error');
                }
            } catch (error) {
                showAlert('Error adding season', 'error');
            }
        });

        loadSeasonalRates();
    </script>
</body>
</html>
