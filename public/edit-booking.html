<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Booking - Lakeside Retreat Admin</title>
    <link rel="stylesheet" href="/admin-shell.css?v=3">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .breadcrumb {
            margin-bottom: 1.5rem;
        }

        .breadcrumb a {
            color: #2d5a5a;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .breadcrumb a:hover {
            text-decoration: underline;
        }

        .breadcrumb span {
            color: #999;
            margin: 0 0.5rem;
        }

        .breadcrumb .current {
            color: #666;
            font-size: 0.95rem;
        }

        .form-card {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .form-card h2 {
            color: #2d5a5a;
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
        }

        .form-section {
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid #eee;
        }

        .form-section:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }

        .form-section h3 {
            color: #666;
            margin-bottom: 1rem;
            font-size: 1.1rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #333;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #2d5a5a;
        }

        .form-group input[readonly] {
            background: #f0f0f0;
            color: #666;
            cursor: not-allowed;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: #2d5a5a;
            color: white;
        }

        .btn-primary:hover {
            background: #1e4040;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .button-group {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .alert {
            padding: 1rem;
            border-radius: 4px;
            margin-bottom: 1rem;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .readonly-info {
            background: #f8f9fa;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .readonly-info .info-row {
            display: flex;
            justify-content: space-between;
            padding: 0.4rem 0;
            border-bottom: 1px solid #eee;
        }

        .readonly-info .info-row:last-child {
            border-bottom: none;
        }

        .readonly-info .info-label {
            font-weight: 500;
            color: #666;
        }

        .readonly-info .info-value {
            color: #333;
            font-family: monospace;
            font-size: 0.9rem;
        }

        .loading-spinner {
            text-align: center;
            padding: 3rem;
            color: #666;
        }

        @media (max-width: 768px) {
            .container {
                padding: 0 1rem;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .button-group {
                flex-direction: column;
            }

            .button-group .btn {
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="breadcrumb">
            <a href="/admin-bookings.html">Back to Bookings</a>
            <span>/</span>
            <span class="current">Edit Booking</span>
        </div>

        <div id="alertBox"></div>

        <div class="form-card">
            <h2>Edit Booking</h2>

            <div id="loadingState" class="loading-spinner">
                Loading booking data...
            </div>

            <form id="bookingForm" style="display: none;">
                <div class="form-section">
                    <h3>Booking Information</h3>
                    <div class="readonly-info" id="readonlyInfo">
                        <div class="info-row">
                            <span class="info-label">Booking ID</span>
                            <span class="info-value" id="infoBookingId">-</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Created</span>
                            <span class="info-value" id="infoCreatedAt">-</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Source</span>
                            <span class="info-value" id="infoSource">-</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Stripe ID</span>
                            <span class="info-value" id="infoStripeId">-</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Uplisting ID</span>
                            <span class="info-value" id="infoUplistingId">-</span>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h3>Guest Information</h3>
                    <div class="form-group">
                        <label for="guestName">Guest Name *</label>
                        <input type="text" id="guestName" required placeholder="Full name">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="guestEmail">Email *</label>
                            <input type="email" id="guestEmail" required placeholder="email@example.com">
                        </div>
                        <div class="form-group">
                            <label for="guestPhone">Phone</label>
                            <input type="tel" id="guestPhone" placeholder="+64 XXX XXX XXXX">
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h3>Booking Details</h3>
                    <div class="form-group">
                        <label for="accommodation">Accommodation *</label>
                        <select id="accommodation" required>
                            <option value="">Select accommodation...</option>
                            <option value="dome-pinot">Dome Pinot</option>
                            <option value="dome-rose">Dome Ros&eacute;</option>
                            <option value="lakeside-cottage">Lakeside Cottage</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="checkIn">Check-in Date *</label>
                            <input type="date" id="checkIn" required>
                        </div>
                        <div class="form-group">
                            <label for="checkOut">Check-out Date *</label>
                            <input type="date" id="checkOut" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="guests">Number of Guests</label>
                            <input type="number" id="guests" min="1" max="10" value="2">
                        </div>
                        <div class="form-group">
                            <label for="totalPriceInput">Total Price ($)</label>
                            <input type="number" id="totalPriceInput" step="0.01" min="0" placeholder="0.00">
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h3>Status</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="status">Booking Status</label>
                            <select id="status">
                                <option value="pending">Pending</option>
                                <option value="confirmed">Confirmed</option>
                                <option value="cancelled">Cancelled</option>
                                <option value="completed">Completed</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="paymentStatus">Payment Status</label>
                            <select id="paymentStatus">
                                <option value="pending">Pending</option>
                                <option value="completed">Completed</option>
                                <option value="refunded">Refunded</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h3>Notes</h3>
                    <div class="form-group">
                        <label for="notes">Internal Notes</label>
                        <textarea id="notes" rows="4" placeholder="Any special requests or notes..."></textarea>
                    </div>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn btn-primary" id="saveBtn">Save Changes</button>
                    <a href="/admin-bookings.html" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <script src="/admin-shell.js?v=3"></script>
    <script>
        // Authentication is handled by admin-shell.js via cookie verification

        // escapeHtml() provided globally by admin-shell.js

        // Get booking ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const bookingId = urlParams.get('id');

        if (!bookingId) {
            document.getElementById('loadingState').textContent = 'No booking ID specified.';
            document.getElementById('alertBox').innerHTML = '<div class="alert alert-error">No booking ID provided. <a href="/admin-bookings.html">Return to bookings</a></div>';
        }

        // Load booking data
        async function loadBooking() {
            if (!bookingId) return;

            try {
                const response = await fetch(`/api/admin/booking/${encodeURIComponent(bookingId)}`, {
                    credentials: 'same-origin'
                });

                if (!response.ok) {
                    throw new Error('Failed to load booking');
                }

                const data = await response.json();
                if (!data.success || !data.booking) {
                    throw new Error('Booking not found');
                }

                const booking = data.booking;

                // Populate read-only info
                document.getElementById('infoBookingId').textContent = escapeHtml(booking.id);
                document.getElementById('infoCreatedAt').textContent = booking.created_at ? new Date(booking.created_at).toLocaleString() : '-';
                document.getElementById('infoSource').textContent = escapeHtml(booking.booking_source || 'N/A');
                document.getElementById('infoStripeId').textContent = escapeHtml(booking.stripe_session_id || booking.stripe_payment_id || 'N/A');
                document.getElementById('infoUplistingId').textContent = escapeHtml(booking.uplisting_id || 'N/A');

                // Populate editable fields
                document.getElementById('guestName').value = booking.guest_name || '';
                document.getElementById('guestEmail').value = booking.guest_email || '';
                document.getElementById('guestPhone').value = booking.guest_phone || '';
                document.getElementById('accommodation').value = booking.accommodation || '';
                document.getElementById('checkIn').value = booking.check_in || '';
                document.getElementById('checkOut').value = booking.check_out || '';
                document.getElementById('guests').value = booking.guests || 2;
                document.getElementById('totalPriceInput').value = booking.total_price || '';
                document.getElementById('status').value = booking.status || 'pending';
                document.getElementById('paymentStatus').value = booking.payment_status || 'pending';
                document.getElementById('notes').value = booking.notes || '';

                // Show form, hide loading
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('bookingForm').style.display = 'block';

                // Update page title
                document.title = `Edit: ${escapeHtml(booking.guest_name)} - Lakeside Retreat Admin`;

            } catch (error) {
                document.getElementById('loadingState').textContent = 'Failed to load booking.';
                document.getElementById('alertBox').innerHTML = `<div class="alert alert-error">Error loading booking: ${escapeHtml(error.message)}. <a href="/admin-bookings.html">Return to bookings</a></div>`;
            }
        }

        // Client-side validation
        function validateBookingForm() {
            const errors = [];
            const name = document.getElementById('guestName').value.trim();
            const email = document.getElementById('guestEmail').value.trim();
            const accommodation = document.getElementById('accommodation').value;
            const checkIn = document.getElementById('checkIn').value;
            const checkOut = document.getElementById('checkOut').value;
            const guests = parseInt(document.getElementById('guests').value);
            const totalPrice = parseFloat(document.getElementById('totalPriceInput').value);

            if (!name) errors.push('Guest name is required.');
            if (!email) errors.push('Guest email is required.');
            else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) errors.push('Please enter a valid email address.');
            if (!accommodation) errors.push('Accommodation is required.');
            if (!checkIn) errors.push('Check-in date is required.');
            if (!checkOut) errors.push('Check-out date is required.');
            if (checkIn && checkOut && new Date(checkOut) <= new Date(checkIn)) errors.push('Check-out must be after check-in.');
            if (isNaN(guests) || guests < 1) errors.push('Number of guests must be at least 1.');
            if (isNaN(totalPrice) || totalPrice < 0) errors.push('Total price must be a valid positive number.');

            return errors;
        }

        // Form submission with CSRF token
        document.getElementById('bookingForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            // Validate before submitting
            const validationErrors = validateBookingForm();
            if (validationErrors.length > 0) {
                document.getElementById('alertBox').innerHTML = `<div class="alert alert-error">${validationErrors.map(e => escapeHtml(e)).join('<br>')}</div>`;
                window.scrollTo({ top: 0, behavior: 'smooth' });
                return;
            }

            const saveBtn = document.getElementById('saveBtn');
            saveBtn.disabled = true;
            saveBtn.textContent = 'Saving...';

            const bookingData = {
                guest_name: document.getElementById('guestName').value.trim(),
                guest_email: document.getElementById('guestEmail').value.trim(),
                guest_phone: document.getElementById('guestPhone').value.trim(),
                accommodation: document.getElementById('accommodation').value,
                check_in: document.getElementById('checkIn').value,
                check_out: document.getElementById('checkOut').value,
                guests: parseInt(document.getElementById('guests').value),
                total_price: parseFloat(document.getElementById('totalPriceInput').value) || 0,
                status: document.getElementById('status').value,
                payment_status: document.getElementById('paymentStatus').value,
                notes: document.getElementById('notes').value
            };

            try {
                // Fetch CSRF token first
                const csrfRes = await fetch('/api/csrf-token', { credentials: 'same-origin' });
                const csrfData = await csrfRes.json();

                const response = await fetch(`/api/admin/booking/${encodeURIComponent(bookingId)}`, {
                    method: 'PUT',
                    credentials: 'same-origin',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRF-Token': csrfData.csrfToken
                    },
                    body: JSON.stringify(bookingData)
                });

                if (response.ok) {
                    document.getElementById('alertBox').innerHTML = '<div class="alert alert-success">Booking updated successfully! Redirecting...</div>';
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                    setTimeout(() => {
                        window.location.href = '/admin-bookings.html';
                    }, 1500);
                } else {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.error || 'Failed to update booking');
                }
            } catch (error) {
                document.getElementById('alertBox').innerHTML = `<div class="alert alert-error">Error updating booking: ${escapeHtml(error.message)}</div>`;
                window.scrollTo({ top: 0, behavior: 'smooth' });
                saveBtn.disabled = false;
                saveBtn.textContent = 'Save Changes';
            }
        });

        // Load the booking on page load
        loadBooking();
    </script>
</body>
</html>
